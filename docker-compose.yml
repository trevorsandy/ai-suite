include:
  - ./supabase/docker/docker-compose.yml

volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  open-webui_storage:
  pipelines_storage:

networks:
  ai-local:

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['ai-local']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=db
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_POSTGRESDB_DATABASE=postgres
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - WEBHOOK_URL=${N8N_HOSTNAME:+https://}${N8N_HOSTNAME:-http://localhost:5678}
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
  env_file:
    - path: .env
      required: true

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: ['ai-local']
  restart: unless-stopped
  ports:
    - 127.0.0.1:11434:11434
  expose:
    - 11434/tcp
  environment:
    - OLLAMA_CONTEXT_LENGTH=8192
    - OLLAMA_FLASH_ATTENTION=1
    - OLLAMA_KV_CACHE_TYPE=q8_0
    - OLLAMA_MAX_LOADED_MODELS=2
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  container_name: ollama-pull-llama
  networks: ['ai-local']
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
  command:
    - "-c"
    - "sleep 3; ollama pull qwen3:8b; ollama pull llama3.2; ollama pull nomic-embed-text"

name: ai-suite
services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    networks: ['ai-local']
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:8080
    expose:
      - 8080/tcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui_storage:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-ollama:11434}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN:-'*'}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-'*'}
    env_file:
      - path: .env
        required: true

  open-webui-pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: open-webui-pipelines
    networks: ['ai-local']
    restart: unless-stopped
    ports:
      - 127.0.0.1:9099:9099
    expose:
      - 9099/tcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pipelines_storage:/app/pipelines
      - ./piplines:/root/.pipelines
    environment:
      - PIPELINES_API_KEY=0p3n-w3bu!
      - PIPELINES_DIR=/root/.pipelines
    depends_on:
      - open-webui
      - postgres

  open-webui-filesystem:
    image: open-webui-tools/filesystem
    container_name: open-webui-filesystem
    networks: ['ai-local']
    build:
      context: ./open-webui-tools/filesystem
    ports:
      - 127.0.0.1:8091:8091
    expose:
      - 8091/tcp
    depends_on:
      - open-webui

  flowise:
    image: flowiseai/flowise
    container_name: flowise
    networks: ['ai-local']
    restart: unless-stopped
    ports:
      - 127.0.0.1:3001:3001
    expose:
      - 3001/tcp
    environment:
      - PORT=3001
      - FLOWISE_USERNAME
      - FLOWISE_PASSWORD
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
        - ./flowise:/root/.flowise
    entrypoint: /bin/sh -c "sleep 3; flowise start"

  postgres:
    image: postgres:${POSTGRES_VERSION:-18-alpine}
    container_name: postgres
    networks: ['ai-local']
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - 127.0.0.1:5433:5432
    expose:
      - 5432/tcp
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    networks: ['ai-local']
    restart: unless-stopped
    ports:
      - 127.0.0.1:6333:6333
      - 127.0.0.1:6334:6334
    expose:
      - 6333/tcp
      - 6334/tcp
    volumes:
      - qdrant_storage:/qdrant/storage

  n8n-import:
    <<: *service-n8n
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/data/credentials && n8n import:workflow --separate --input=/data/workflows"
    volumes:
      - ./n8n/data:/data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 127.0.0.1:5678:5678
    expose:
      - 5678/tcp
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/data:/data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-gpu-amd:
    profiles: ["gpu-amd"]
    <<: *service-ollama
    image: ollama/ollama:rocm
    devices:
      - "/dev/kfd"
      - "/dev/dri"

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu

  ollama-pull-llama-gpu-amd:
    profiles: [gpu-amd]
    <<: *init-ollama
    image: ollama/ollama:rocm
    depends_on:
     - ollama-gpu-amd
